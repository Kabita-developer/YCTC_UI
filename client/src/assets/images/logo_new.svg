<svg width="300" height="120" viewBox="0 0 300 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- JYCSM Text -->
  <text x="0" y="70" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="64" fill="#1D89C6">JYCSM</text>
  
  <!-- Skill Development Text -->
  <text x="0" y="105" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="24" fill="#F4951A">Skill Development</text>
  
  <!-- Star and Graduate Section -->
  <g transform="translate(200, 10)">
    <!-- Star Shapes -->
    <!-- Right side (Blue-ish) -->
    <path d="M50 0 L66.5 35 H100 L73 55 L83 90 L50 70 L17 90 L27 55 L0 35 H33.5 L50 0Z" fill="#1D89C6" />
    <!-- Overlaying Yellow on the Left side -->
    <path d="M50 0 L33.5 35 H0 L27 55 L17 90 L50 70 V0Z" fill="#F4951A" />
    
    <!-- Graduate Silhouette (White) -->
    <circle cx="50" cy="35" r="8" fill="white" /> <!-- Head -->
    <path d="M42 30 L50 22 L58 30 L50 38 Z" fill="white" /> <!-- Cap Top -->
    <path d="M50 34 L52 42" stroke="white" stroke-width="1.5" /> <!-- Tassel -->
    <!-- Body/Arms Success Pose -->
    <path d="M50 45 C40 45 35 55 35 60 L40 65 L50 60 L60 65 L65 60 C65 55 60 45 50 45Z" fill="white" />
    <path d="M50 45 V85" stroke="white" stroke-width="6" stroke-linecap="round" /> <!-- Trunk -->
    <!-- Tie/Shirt detail -->
    <path d="M48 50 L50 55 L52 50 Z" fill="#1D89C6" />
  </g>
  
  <!-- TM Symbol -->
  <g transform="translate(290, 25)">
    <circle cx="0" cy="0" r="7" stroke="black" stroke-width="1.2" fill="none"/>
    <text x="0" y="3" font-family="Arial" font-size="8" font-weight="bold" text-anchor="middle" fill="black">TM</text>
  </g>
</svg>
